<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="withdraw.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="withdraw-container">
        <h3>Pul yechish</h3>
        
        <div class="method-selector">
            <div class="method-card active" data-type="Uzcard">
                <img src="https://click.uz/click/images/uzcard_logo.png" alt="Uzcard">
                <span>Uzcard</span>
            </div>
            <div class="method-card" data-type="Humo">
                <img src="https://humocard.uz/bitrix/templates/main/assets/img/humo%20logo%20%281%29.png" alt="Humo">
                <span>Humo</span>
            </div>
        </div>

        <div class="input-group">
            <label>Karta raqami</label>
            <input type="number" id="cardNumber" placeholder="8600 ...." maxlength="16">
        </div>

        <div class="input-group">
            <label>Summa (Min: 5,000)</label>
            <input type="number" id="amount" placeholder="5000">
        </div>

        <button id="sendRequest">SO'ROV YUBORISH</button>
        <p id="statusMsg"></p>
    </div>

    <script src="withdraw.js"></script>
</body>
</html>
