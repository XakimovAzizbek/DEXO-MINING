<script>

  inAppSettings: {
    frequency: 1,      // Ko'rsatishlar soni: 1 ta reklama
    capping: 0.11,    // Umumiy vaqt chegarasi (taxminan 400 sekundni qoplashi uchun)
    interval: 400,    // Reklamalar orasidagi vaqt: 400 sekund

<body>
    <div class="header">
        <div class="logo">DEXO<span>MINING</span></div>
        <div class="balance-card">
            <small>UMUMIY BALANS</small>
            <div class="amount"><span id="balance">0.00</span> SO'M</div>
        </div>
    </div>

    <div class="main-container">
        <div class="terminal-container">
            <div class="terminal-header">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
                <span class="title">DEXO CONSOLE v2.1</span>
            </div>
            <div id="console-output" class="terminal-body">
                <div class="line">> Tizim yuklanmoqda...</div>
            </div>
        </div>
        <button id="startBtn" class="mining-btn">START MINING</button>

        <!-- MINI OYNACHA - REKLAMA -->
        <div class="mini-window">
            <div class="mini-window-header">
                <div class="mini-window-dots">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                </div>
                <div class="mini-window-title">
                    <span class="mini-window-icon">📡</span>
                    <span>AD BROADCAST</span>
                </div>
                <div class="mini-window-badge">LIVE</div>
            </div>
            <div class="mini-window-body">
                <div class="mini-window-scanline"></div>
                <iframe
                    src="reklama.html"
                    class="mini-window-iframe"
                    frameborder="0"
                    scrolling="no"
                    title="Reklama"
                ></iframe>
            </div>
            <div class="mini-window-footer">
                <div class="mini-window-signal">
                    <span class="signal-bar"></span>
                    <span class="signal-bar"></span>
                    <span class="signal-bar"></span>
                    <span class="signal-bar"></span>
                </div>
                <span class="mini-window-status">DEXO NET // SPONSORED</span>
            </div>
        </div>
