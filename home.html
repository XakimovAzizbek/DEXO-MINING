<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEXO MINING v2.2</title>
    <link rel="stylesheet" href="home.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
</head>
<body>
    <div class="header">
        <div class="logo">DEXO<span>MINING</span></div>
        <div class="balance-card-mini">
            <small>BALANS</small>
            <div class="amount-mini"><span id="balance">0.00</span> SO'M</div>
        </div>
    </div>

    <div class="main-container">
        <div class="glass-box terminal-box">
            <div class="box-header">
                <div class="dots">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                </div>
                <div class="box-title">HASH CONSOLE</div>
            </div>
            <div id="console-output" class="box-body terminal-text">
                <div class="line">> Tizim tayyor...</div>
            </div>
        </div>

        <button id="startBtn" class="mining-btn">START MINING</button>

        <div class="ads-grid">
            <div class="glass-box ad-box">
                <div class="box-header">
                    <div class="box-title">📡 BROADCAST #1</div>
                    <div class="badge">LIVE</div>
                </div>
                <div class="box-body ad-content">
                    <iframe src="reklama.html" frameborder="0" scrolling="no"></iframe>
                </div>
            </div>

            <div class="glass-box ad-box">
                <div class="box-header">
                    <div class="box-title">📡 BROADCAST #2</div>
                    <div class="badge purple">NEW</div>
                </div>
                <div class="box-body ad-content">
                    <iframe src="reklama2.html" frameborder="0" scrolling="no"></iframe>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item active">🏠<span>Asosiy</span></a>
        <a href="profile.html" class="nav-item">👤<span>Profil</span></a>
    </nav>

    <script src="home.js"></script>
</body>
</html>
