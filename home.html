<!DOCTYPE html>
<html lang="uz">
<head>

            </div>

        <button id="startBtn" class="mining-btn">START MINING</button>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item active">
            <div class="icon">🏠</div>
